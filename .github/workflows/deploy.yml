name: Build & Deploy to one.com

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via SFTP
        run: |
          sudo apt-get install -y lftp
          lftp sftp://${{ secrets.FTP_USERNAME_ONE }}:${{ secrets.FTP_PASSWORD_ONE }}@${{ secrets.FTP_HOST_ONE }}:22 <<EOF
          set sftp:auto-confirm yes
          mirror -R --delete --verbose ./dist/ /www/remember/
          bye
          EOF
