name: Build & Deploy to one.com

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST_ONE }}
          username: ${{ secrets.FTP_USERNAME_ONE }}
          password: ${{ secrets.FTP_PASSWORD_ONE }}
          port: 22
          local-dir: ./dist/
          server-dir: /www/remember/
